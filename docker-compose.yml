services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: canis
      POSTGRES_PASSWORD: canis
      POSTGRES_DB: canis
    ports:
      - "5432:5432"
    volumes:
      - canis_db_data:/var/lib/postgresql/data
      - ./infra/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canis"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://canis:canis@db:5432/canis
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  canis_db_data:
